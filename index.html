    text-align: center;
    pointer-events: none;
    white-space: nowrap;

    text-transform: uppercase;

    flex-wrap: wrap;
    gap: 5px;
    justify-content: flex-end;
    max-width: 220px;

    background: var(--bg-panel);
    border: 1px solid var(--border);
    color: var(--text-sub);
    padding: 4px 9px;
    border-radius: 2px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.58rem; font-weight: 300;
    letter-spacing: 0.12em;

    z-index: 1000;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 2px;
    backdrop-filter: blur(10px);

    font-family: 'Cormorant Garamond', serif;
    font-size: 0.78rem; font-weight: 400;
    color: var(--text-sub);
    letter-spacing: 0.22em; text-transform: uppercase;

    background: rgba(237,230,220,0.97);

    display: flex;
    align-items: center;
    justify-content: center;

    z-index: 1;
    cursor: default;

  #watermark {

    right: 52px;

    font-size: 0.85rem;

    font-family: 'Montserrat', sans-serif;

// ── Index ─────────────────────────────────────────────────────────────────────
const photosByLuogo = {};

  if (!photosByLuogo[p.luogo]) photosByLuogo[p.luogo] = [];
  photosByLuogo[p.luogo].push(p.file);
});

document.getElementById('total-count').textContent = allPhotos.length;

function getColor(n) {
  if (n >= 20) return '#b5572a';
  if (n >= 6)  return '#c87a4e';
  if (n >= 3)  return '#4a7a6d';
  if (n === 2) return '#2d5c52';
  return '#8a7660';
}

function getRadius(n) {
  if (n >= 20) return 18;
  if (n >= 6)  return 13;
  if (n >= 3)  return 10;
  if (n === 2) return 8;
  return 7;
}

// ── Mappa ─────────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([43, 10], 4);

let currentTileLayer = L.tileLayer(tileLayers['it'], {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19
}).addTo(map);

const markers = [];

luoghi.forEach(l => {
  const photos = photosByLuogo[l.nome] || [];
  const n = photos.length;
  if (n === 0) return;
  const color = getColor(n);

  const circle = L.circleMarker([l.lat, l.lng], {
    radius: getRadius(n),
    fillColor: color,
    color: 'rgba(255,255,255,0.6)',
    weight: 1.5,
    fillOpacity: 0.85,
  }).addTo(map);

  circle.bindPopup('');
  markers.push({ circle, luogoKey: l.nome, n, color });
});

      e.preventDefault();
    }

});

// ── Lingua ────────────────────────────────────────────────────────────────────
let currentLang = 'it';

function setLang(lang) {
  currentLang = lang;
  const t = translations[lang];
  const isRtl = lang === 'ar';

  document.documentElement.lang = lang;
  document.body.dir = isRtl ? 'rtl' : 'ltr';

  document.getElementById('ui-subtitle').textContent     = t.subtitle;
  document.getElementById('ui-legend-title').textContent = t.legendTitle;
  document.getElementById('ui-l1').textContent           = t.l1;
  document.getElementById('ui-l2').textContent           = t.l2;
  document.getElementById('ui-l3').textContent           = t.l3;
  document.getElementById('ui-l4').textContent           = t.l4;
  document.getElementById('ui-l5').textContent           = t.l5;
  document.getElementById('ui-total-label').textContent  = t.totalLabel;

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${lang}'`));
  });

  map.removeLayer(currentTileLayer);
  currentTileLayer = L.tileLayer(tileLayers[lang] || tileLayers['en'], {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(map);

  markers.forEach(({ circle, luogoKey, n, color }) => {
    const localName = (placeNames[luogoKey] || {})[lang] || luogoKey;
    const label = t.shots(n);
    circle.setPopupContent(`
      <div class="popup-name">
        <span class="popup-dot" style="background:${color};"></span>${localName}
      </div>
      <div class="popup-count">${label}</div>
      <a class="popup-btn" onclick="openLightbox('${luogoKey}', 0)">${t.browseBtn}</a>
    `);
  });

  if (document.getElementById('lightbox').classList.contains('active') && currentLuogo) {
    const localName = (placeNames[currentLuogo] || {})[lang] || currentLuogo;
    document.getElementById('lightbox-title').textContent = localName;
  }
}

setLang('it');

// ── Lightbox ──────────────────────────────────────────────────────────────────
let currentLuogo = null;
let currentPhotos = [];
let currentIndex = 0;

function openLightbox(luogo, index) {
  currentLuogo = luogo;
  currentPhotos = photosByLuogo[luogo] || [];
  currentIndex = index;
  const localName = (placeNames[luogo] || {})[currentLang] || luogo;
  document.getElementById('lightbox-title').textContent = localName;
  renderLightbox();
  document.getElementById('lightbox').classList.add('active');
}

function renderLightbox() {
  const file = currentPhotos[currentIndex];
  const n = currentPhotos.length;

  document.getElementById('lightbox-counter').textContent = `${currentIndex + 1} / ${n}`;
  document.getElementById('lightbox-img').src = file;
  document.getElementById('lightbox-filename').textContent = file;
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex === n - 1;

  const strip = document.getElementById('thumb-strip');
  strip.innerHTML = '';
  currentPhotos.forEach((f, i) => {
    const img = document.createElement('img');
    img.src = f;
    img.draggable = false;
    img.className = 'thumb' + (i === currentIndex ? ' active' : '');
    img.onclick = () => { currentIndex = i; renderLightbox(); };
    strip.appendChild(img);
  });

  const activeThumb = strip.children[currentIndex];
  if (activeThumb) activeThumb.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

function navigate(dir) {
  currentIndex = Math.max(0, Math.min(currentPhotos.length - 1, currentIndex + dir));
  renderLightbox();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === 'Escape')     closeLightbox();
});

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});
