  }

  #map { width: 100%; height: 100%; }

    text-align: center;
    pointer-events: none;
    white-space: nowrap;
  }

  #title-box h1 {

    font-size: 2rem;
    font-weight: 600;
    color: #f5f0e8;
    letter-spacing: 0.08em;

  }

  #title-box p {
    font-size: 0.65rem;
    font-weight: 300;
    color: #c8b99a;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: 4px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }

  #legend {
    position: absolute;
    bottom: 32px;
    right: 28px;
    z-index: 1000;
    background: rgba(20,17,13,0.82);
    border: 1px solid rgba(200,185,154,0.25);
    border-radius: 3px;
    padding: 16px 20px;
    backdrop-filter: blur(8px);
  }

  #legend h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem;
    font-weight: 400;
    color: #c8b99a;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 0.68rem;
    font-weight: 300;
    color: #e8dfc8;
    letter-spacing: 0.05em;
  }

  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  #counter {
    position: absolute;
    bottom: 32px;
    left: 28px;
    z-index: 1000;
    background: rgba(20,17,13,0.82);
    border: 1px solid rgba(200,185,154,0.25);
    border-radius: 3px;
    padding: 14px 20px;
    backdrop-filter: blur(8px);
    text-align: center;
  }

  #counter .num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 600;
    color: #f5f0e8;
    line-height: 1;
  }

  #counter .label {
    font-size: 0.6rem;
    font-weight: 300;
    color: #c8b99a;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 2000;
    background: rgba(10,8,6,0.96);
    backdrop-filter: blur(16px);
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #lightbox.active { display: flex; }

  #lightbox-header {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 36px;
  }

  #lightbox-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 600;
    color: #f5f0e8;
    letter-spacing: 0.06em;
  }

  #lightbox-counter {
    font-size: 0.65rem;
    font-weight: 300;
    color: #c8b99a;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  #lightbox-close {
    background: none;
    border: 1px solid rgba(200,185,154,0.3);
    color: #c8b99a;
    width: 36px; height: 36px;
    border-radius: 2px;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  #lightbox-close:hover { background: rgba(200,185,154,0.1); color: #f5f0e8; }

  #lightbox-img-wrap {
    max-width: 80vw;
    max-height: 72vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #lightbox-img {
    max-width: 100%;
    max-height: 72vh;
    object-fit: contain;
    border: 1px solid rgba(200,185,154,0.15);
    box-shadow: 0 20px 80px rgba(0,0,0,0.8);
  }

  #lightbox-filename {
    margin-top: 12px;
    font-size: 0.58rem;
    font-weight: 300;
    color: #5a5040;
    letter-spacing: 0.15em;
  }

  #thumb-strip {
    position: absolute;
    bottom: 82px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    max-width: 80vw;
    overflow-x: auto;
    padding: 4px;

  #thumb-strip::-webkit-scrollbar { height: 3px; }
  #thumb-strip::-webkit-scrollbar-thumb { background: rgba(200,185,154,0.3); border-radius: 2px; }

  .thumb {
    width: 50px; height: 50px;
    object-fit: cover;
    border: 1px solid rgba(200,185,154,0.12);
    border-radius: 2px;
    cursor: pointer;
    opacity: 0.45;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .thumb.active { opacity: 1; border-color: rgba(200,185,154,0.7); }

    font-size: 0.52rem !important;

  if (n >= 20) return '#c0392b';
  if (n >= 6)  return '#e67e22';
  if (n >= 3)  return '#f1c40f';
  if (n === 2) return '#27ae60';
  return '#2980b9';
}

  if (n >= 20) return 18;
  if (n >= 6)  return 13;
  if (n >= 3)  return 10;
  if (n === 2) return 8;
  return 7;
}

  if (n === 0) return;
  const color = getColor(n);
  const label = n === 1 ? '1 scatto' : `${n} scatti`;

  const circle = L.circleMarker([l.lat, l.lng], {
    radius: getRadius(n),
    fillColor: color,
    color: 'rgba(255,255,255,0.3)',
    weight: 1.5,
    fillOpacity: 0.88,
  }).addTo(map);

  circle.bindPopup(`
    <div class="popup-name">
      <span class="popup-dot" style="background:${color};"></span>${l.nome}
    </div>
    <div class="popup-count">${label}</div>
    <a class="popup-btn" onclick="openLightbox('${l.nome}', 0)">Sfoglia le foto →</a>
  `);
});

// ── Lightbox ──────────────────────────────────────────────────────────────────
let currentLuogo = null;
let currentPhotos = [];
let currentIndex = 0;

function openLightbox(luogo, index) {
  currentLuogo = luogo;
  currentPhotos = photosByLuogo[luogo] || [];
  currentIndex = index;
  document.getElementById('lightbox-title').textContent = luogo;
  renderLightbox();
  document.getElementById('lightbox').classList.add('active');
}

function renderLightbox() {
  const file = currentPhotos[currentIndex];
  const n = currentPhotos.length;

  document.getElementById('lightbox-counter').textContent =
    `${currentIndex + 1} / ${n}`;
  document.getElementById('lightbox-img').src = file;
  document.getElementById('lightbox-filename').textContent = file;
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex === n - 1;

  const strip = document.getElementById('thumb-strip');
  strip.innerHTML = '';
  currentPhotos.forEach((f, i) => {
    const img = document.createElement('img');
    img.src = f;
    img.className = 'thumb' + (i === currentIndex ? ' active' : '');
    img.onclick = () => { currentIndex = i; renderLightbox(); };
    strip.appendChild(img);
  });

  const activeThumb = strip.children[currentIndex];
  if (activeThumb) activeThumb.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

function navigate(dir) {
  currentIndex = Math.max(0, Math.min(currentPhotos.length - 1, currentIndex + dir));
  renderLightbox();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === 'Escape')     closeLightbox();
});

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});
</script>
